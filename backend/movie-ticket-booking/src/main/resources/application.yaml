spring:
  application:
    name: movie-ticket-booking

  datasource:
    url: jdbc:mysql://localhost:3306/movie_ticket_booking
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: none
      properties:
        hibernate:
          format_sql: true

    flyway:
      enabled: true

  server:
    port: 8080
